<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reveal Gorilla</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e1e2f, #3a3a5f);
      font-family: Arial, sans-serif;
      color: white;
      flex-direction: column;
      gap: 20px;
    }

    button {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: #6c63ff;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    button:hover {
      background: #5848e5;
      transform: scale(1.05);
    }

    img {
      width: 250px;
      border-radius: 15px;
      opacity: 0;
      transform: scale(0.9);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    img.show {
      opacity: 1;
      transform: scale(1);
    }
  </style>
</head>

<body>

  <button onclick="showGorilla()">Tap to reveal</button>
  <img src="https://www.meme-arsenal.com/en/create/chose?tag=monkey+fuck" id="gor" alt="Gorilla">

  <script>
    const gorilla = document.getElementById("gor");

    function showGorilla() {
      gorilla.classList.add("show");
    }
  </script>

</body>
</html>
